	<script>
		function post(postData) {
			// iuアカウントの マイドライブ - [非公開] プログラミング基礎実習 - Scratch課題の進捗収集
			// スプレッドシートの拡張機能から、Apps ScriptでGASのコードが見れる
			const gasURL = "https://script.google.com/macros/s/AKfycbzm0bQtRYheRxQMLMoTyMLvIKsK3g3xlzKR62e41dxiPWwqY-vP1AcMQBeb3a1oKJy7Zw/exec";

			console.log("postData", postData);
			fetch(gasURL, {
				method: "POST",
				mode: "no-cors",
				headers: { "Content-Type": "text/plain" },
				body: JSON.stringify(postData)
			}).then(() => {
				console.log("送信完了！スプレッドシートを確認してください。");
			}).catch(err => {
				console.error("エラー:", err);
			});
		}

		function lsSet(key, val) { localStorage.setItem(key, val); }
		function lsGet(key) { var v = localStorage.getItem(key); return v === null ? undefined : v; }
		function lsRemove(key) { localStorage.removeItem(key); }
		function lsEach(fn) { var ks = []; for (var i = 0; i < localStorage.length; i++) ks.push(localStorage.key(i)); ks.forEach(function (k) { fn(k, localStorage.getItem(k)); }); }

		const appName = "jl.bk";
		const lsUrlPrefix = appName + ":" + (new URLSearchParams(window.location.search).get("path") || window.location.pathname) + ":";

		var problems = new function () {
			var self = this;
			self.problems = [];
			self.problemIndexes = {};
			self.stepIndex;
			self.noShowButtonIndexes = [];
			self.addedScripts = {};

			self.clear = function () {
				self.problems = [];
				self.noShowButtonIndexes = [];
				self.initIndexes();
			}
			self.getAddedScriptName = function (index) {
				return self.addedScripts[index || self.problemIndexes.current];
			}
			self.isLastProblem = function () {
				return self.problemIndexes.current === self.problems.length - 1;
			}
			self.isFinishedProblem = function () {
				return self.problemIndexes.current <= self.problemIndexes.lastFinished;
			}
			self.getAddedScriptIndex = function (name) {
				for (var i in self.addedScripts) {
					if (self.addedScripts[i] === name) {
						return i;
					}
				}
				return -1;
			}
			self.addScript = function (scriptName) {
				self.addScriptIn(scriptName, function () {
					self.restart(self.problems.length - 1);
					self.save();
					self.panel.init();
				});
			}
			self.addScriptIn = function (scriptName, onComplete) {
				plib.setScriptName(scriptName);
				$.getScript(scriptName)
					.done(function (script, textStatus) {
						plib.unsetScriptName();
						self.addedScripts[self.problems.length - 1] = scriptName;
						if (onComplete) {
							onComplete();
						}
					})
					.fail(function (jqxhr, setting, exception) {
						alert("読み込みに失敗しました。スクリプト名を確認してみてください。スクリプト名の入力例： 001.js");
						plib.unsetScriptName();
					});
			}
			self.removeAllAddedScriptCookies = function () {
				lsEach(function (name, value) {
					if ((new RegExp("^" + "problem.addedScript.")).test(name)) {
						lsRemove(name);
					}
				});
			}
			self.removeAllAddedScripts = function () {
				self.removeAllAddedScriptCookies();
				for (var i = self.problems.length - 1; i >= 0; i--) {
					if (self.addedScripts[i] !== undefined) {
						self.problems.splice(i, 1);
					}
				}
				self.addedScripts = {};
			}
			self.removeAddedScript = function () {
				self.problemIndexes.lastOpened = Math.max(0, self.problemIndexes.lastOpened - 1);
				self.problemIndexes.current = Math.max(0, self.problemIndexes.current - 1);
				delete self.addedScripts[self.problems.length - 1];
				self.problems.splice(self.problems.length - 1, 1);
				self.removeAllAddedScriptCookies();
				self.save();
				self.panel.init();
				/*
				console.log("---after remove");
				Object.keys(self.addedScripts).forEach(function(elem,i){
					console.log(elem+":"+self.addedScripts[elem]);
				});
				*/
			}
			self.initIndexes = function () {
				self.problemIndexes.current = 0;
				self.problemIndexes.lastOpened = 0;
				self.problemIndexes.lastFinished = -1;
				self.stepIndex = -1;
			}
			self.setAllFinished = function () {
				self.problemIndexes.lastOpened = self.problems.length;
				self.problemIndexes.lastFinished = self.problems.length - 1;
			}
			self.load = function () {
				var scNames = [];
				lsEach(function (name, value) {
					var ret = name.match(new RegExp("problem\\.addedScript\\.([^\.]*)"));
					if (ret !== null) {
						/*
						console.log("name",name);
						console.log("value",value);
						console.log("ret",ret);
						*/
						var index = ret[1];
						scNames.push(value);
					}
				});
				var cnt = 0;
				var f = function () {
					cnt++;
					if (cnt >= scNames.length) {
						Object.keys(self.problemIndexes).forEach(function (elem) {
							var index = lsGet(lsUrlPrefix + "problemIndexes." + elem);
							if (index !== undefined) {
								self.problemIndexes[elem] = Number(index);
							}
						});
						setModule({ "name": "main", "window": window, "commands": commands });
					} else {
						self.addScriptIn(scNames[cnt], f);
					}
				}
				if (scNames.length === 0) {
					f();
				} else {
					self.addScriptIn(scNames[cnt], f);
				}
			}
			self.save = function () {
				Object.keys(self.problemIndexes).forEach(function (elem) {
					lsSet(lsUrlPrefix + "problemIndexes." + elem, self.problemIndexes[elem]);
				});
				self.removeAllAddedScriptCookies();
				Object.keys(self.addedScripts).forEach(function (elem, i) {
					lsSet("problem.addedScript." + elem, self.addedScripts[elem]);
					//console.log(elem+":"+self.addedScripts[elem]);
				});
			}
			self.noShowButton = function (n) {
				self.noShowButtonIndexes.push(n);
			}
			self.isShowButton = function (i) {
				return -1 === self.noShowButtonIndexes.indexOf(i);
			}
			self.isFinished = function () {
				return self.problemIndexes.lastFinished === self.problems.length - 1;
			}
			self.next = function () {
				//console.log(self.problemIndexes.current,self.problems.length);
				if (self.problemIndexes.current === self.problems.length) {
					console.log("既に問題終了");
					return true;
				}
				if (self.stepIndex === self.problems[self.problemIndexes.current].length - 1) {
					console.log("問題のクリア: スプレッドシートに結果送信", self.problemIndexes.current);
					post({
						path: lsUrlPrefix,
						kadaiId: self.problemIndexes.current,
						loginId: window.exec({ module: "main", command: "getLoginId" }),
						loginName: window.exec({ module: "main", command: "getLoginName" }),
						success: "合格",
					});

					self.problemIndexes.lastFinished = Math.max(self.problemIndexes.current, self.problemIndexes.lastFinished);
					self.problemIndexes.current++;
					self.problemIndexes.lastOpened = Math.max(self.problemIndexes.current, self.problemIndexes.lastOpened);
					self.stepIndex = -1;
					self.panelUpdate();
				}
				self.save();
				self.stepIndex++;
				if (self.problemIndexes.current === self.problems.length) {
					console.log("すべての問題終了");
					main.events.call("allProblemsFinished");
					return true;
				} else {
					return self.problems[self.problemIndexes.current][self.stepIndex]();
				}
			}
			self.prev = function () {
				self.stepIndex = Math.max(self.stepIndex - 1, 0);
				return self.problems[self.problemIndexes.current][self.stepIndex]();
			}
			self.panelUpdate = function () {
				if (self.panel !== undefined) {
					self.panel.update();
				}
			}
			self.restart = function (problemIndex) {
				exec({ module: "code", command: "stop" });
				exec({ module: "main", command: "clearInstruct" });
				//console.log("restart",problemIndex);
				self.problemIndexes.current = problemIndex;
				self.problemIndexes.lastOpened = Math.max(self.problemIndexes.lastOpened, self.problemIndexes.current);
				self.stepIndex = -1;
				self.panelUpdate();
				self.next();
			}
			self.restartAll = function () {
				self.initIndexes();
				self.panel.init();
				self.panelUpdate();
				self.next();
			}
			self.setPanel = function (panel) {
				self.panel = panel;
			}
			self.clear();
		};
		function ProblemsPanel(problems, sel) {
			var self = this;
			self.problems = problems;
			self.problems.setPanel(self);
			self.sel = sel;
			self.init = function () {
				$(".problemButton").remove();
				for (var i = 0, pi = 0; i < self.problems.problems.length; i++) {
					var disp = self.problems.isShowButton(i);
					//console.log("problemsPanel init i="+i+" disp="+disp);
					$("#problemsPanel").append(
						"<a href=\"javascript:problems.restart(" + i + ")\" id=\"problemButton" + i + "\" " +
						"class=\"problemButton\" " +
						"style=\"display:" + (disp ? "inline-block" : "none") + "\">" +
						(pi + 1) + "</a>");
					if (disp) {
						pi++;
					}
				}
				self.update();
			}
			self.update = function () {
				self.problems.problems.forEach(function (elem, i) {
					var pevents = "auto";
					var bkcol = "#f0f0f0";
					if (i === self.problems.problemIndexes.current) {
						bkcol = "#9EDB59";
					} else if (i <= self.problems.problemIndexes.lastFinished) {
						bkcol = "#888800";//"darkblue";
					} else if (i === self.problems.problemIndexes.lastOpened) {
						bkcol = "lightblue";
					} else {
						pevents = "none";
					}
					$("#problemButton" + i).css({ "pointer-events": pevents, background: bkcol });
				});
			}
		};
		var problemsPanel = new ProblemsPanel(problems, "problemsPanel");

	<script>
		function loadScriptsSync() {
			// URLからパラメータを取得（例: ?path=problems/mgr_course_2017/d20170427）
			const urlParams = new URLSearchParams(window.location.search);
			const pathParam = urlParams.get('path');

			// パラメータが指定されていない場合は処理を中断
			if (!pathParam) {
				console.error('URLパラメータ "path" が指定されていません。');
				return;
			}

			// 末尾にスラッシュがなければ付与してベースURLを設定
			const baseUrl = pathParam.endsWith('/') ? pathParam : `${pathParam}/`;

			// 1. 最初に hints.js を同期読み込み
			const hintSuccess = loadSingleScriptSync(`${baseUrl}hints.js`);
			if (!hintSuccess) return;

			// 2. 01.js から順にエラーになるまで同期読み込み
			let fileNumber = 1;
			while (true) {
				const fileName = String(fileNumber).padStart(2, '0') + '.js';
				const fileUrl = `${baseUrl}${fileName}`;
				console.log("loading ", fileUrl)

				const success = loadSingleScriptSync(fileUrl);
				if (!success) {
					break;
				}
				fileNumber++;
			}
		}

		function loadSingleScriptSync(url) {
			const xhr = new XMLHttpRequest();
			xhr.open('GET', url, false); // 同期通信

			try {
				xhr.send();
				if (xhr.status === 200) {
					const script = document.createElement('script');
					script.dataset.src = url;
					script.textContent = xhr.responseText;
					document.head.appendChild(script);
					return true;
				}
			} catch (e) {
				// エラー処理
			}
			return false;
		}

		// 実行
		loadScriptsSync();
	</script>

	<script>
		$(function () {
			window.onresize = resize;
			resize();

			function resize() {
				var h = (window.innerHeight || (window.document.documentElement.clientHeight || window.document.body.clientHeight));
				var divHight = 16 + $("#div_left").height();//16=body padding:8px
				divHight += $("#TopPanel").height() + parseInt($("#TopPanel").css("margin-bottom"), 10);
				divHight += $("#BottomPanel").height();
				$("#content").css({ "min-height": h - divHight + "px" });
				$("#div_left_vertical").css({ "height": h - divHight + "px" });
				$("#div_right_vertical").css({ "height": h - divHight + "px" });

				divHight += 12;

				$("#LeftPanel").css({ "height": h - divHight + "px" });
				$("#CenterPanel").css({ "height": h - divHight + "px" });
				$("#RightPanel").css({
					"height": h - divHight + "px",
					"width": ($("#content").width() - $("#CenterPanel").width() - $("#LeftPanel").width()
						- $("#div_left_vertical").width() - $("#div_right_vertical").width() - 1) + "px",
				});

				window.$('#div_left').next().height(h - divHight - window.$('#div_left').prev().height());
				window.$('#div_center').next().height(h - divHight - window.$('#div_center').prev().height());
				window.$('#div_right').next().height(h - divHight - window.$('#div_right').prev().height());
			}

			window.$.resizable = function (resizerID, vOrH) {
				window.$('#' + resizerID).bind("mousedown", function (e) {
					var start = e.pageY;
					if (vOrH == 'v') start = e.pageX;
					window.$('body').bind("mouseup", function () {
						window.$('body').unbind("mousemove");
						window.$('body').unbind("mouseup");
					});
					window.$('body').bind("mousemove", function (e) {
						var end = e.pageY;
						if (vOrH == 'v') end = e.pageX;
						if (vOrH == 'h') {
							window.$('#' + resizerID).prev().height(window.$('#' + resizerID).prev().height() + (end - start));
							window.$('#' + resizerID).next().height(window.$('#' + resizerID).next().height() - (end - start));
						}
						else {
							window.$('#' + resizerID).prev().width(window.$('#' + resizerID).prev().width() + (end - start));
							window.$('#' + resizerID).next().width(window.$('#' + resizerID).next().width() - (end - start));
						}
						start = end;
					});
				});
			}
			window.$.resizable('div_left_vertical', "v");
			window.$.resizable('div_right_vertical', "v");
			window.$.resizable('div_right', "h");
			window.$.resizable('div_center', "h");
			window.$.resizable('div_left', "h");

				 When iframe is used, javascript in the child html file has different scope against the parent html.
				 If a function in the child html calls a function in the parent html, window.parent can be used.
				 When jquery.load is used, javascript in the child html file has same scope against the parent html.
				 Therefore, conflict of names of functions will occurred.

		function bubbleIframeMouse(iframe) {
			// Save any previous onmousemove handler
			iframe.contentWindow.$(iframe.contentWindow.document).bind("mousemove mouseup", function (e) {
				// Create a new event for the this window
				var evt = document.createEvent("MouseEvents");

				// We'll need this to offset the mouse move appropriately
				var boundingClientRect = iframe.getBoundingClientRect();

				// Initialize the event, copying exiting event values
				// for the most part
				evt.initMouseEvent(
					e.type,
					true, // bubbles
					false, // not cancelable 
					window,
					e.detail,
					e.screenX,
					e.screenY,
					e.clientX + boundingClientRect.left,
					e.clientY + boundingClientRect.top,
					e.ctrlKey,
					e.altKey,
					e.shiftKey,
					e.metaKey,
					e.button,
					null // no related element
				);

				// Dispatch the mousemove event on the iframe element
				iframe.dispatchEvent(evt);
			});
		}

		var commands = new Commands({
			clearInstruct: function () {
				Object.keys(main.modules).forEach(function (elem) {
					var w = elem === "main" ? window : $("#" + elem)[0].contentWindow;
					w.$("body").clearInstruct();
				});
			},
			updateStatus: function (params) {
				Object.keys(main.loginInfo).forEach(function (elem) {
					params[elem] = main.loginInfo[elem];
				});
				//console.log("updateStatus",params);
				main.socket?.emit("status", params);
			},
			updateProblems: function (params) {
				var up = $.extend({ userid: lsGet("loginId"), username: lsGet("loginName") }, params);
				//console.log("updateProblems",up);
				main.socket?.emit("updateProblems", up);
			},
			getLoginId: function () {
				return lsGet("loginId") || "";
			},
			getLoginName: function () {
				return lsGet("loginName") || "";
			},
			setLoginId: function (params) {
				//console.log("setLoginId ("+params.userid+") ("+params.username+")");
				//console.log(params);
				Object.keys(params).forEach(function (elem) {
					main.loginInfo[elem] = params[elem];
				});
				lsSet("loginId", params.userid);
				lsSet("loginName", params.username);
				$("#toolboxLoginName").text(params.username + " (" + params.userid + ")");
			},
			writeLog: function (params) {
				var logdata = {};
				Object.keys(main.loginInfo).forEach(function (elem) {
					logdata[elem] = main.loginInfo[elem];
				});
				logdata.message = params.message;
				Object.keys(main.modules).forEach(function (elem) {
					logdata[main.modules[elem].name + "_text"] = exec({ module: main.modules[elem].name, command: "text" });
				});
				["count_click_run", "count_click_step", "count_click_stop"].forEach(function (elem) {
					logdata[elem] = exec({ module: "code", command: elem });
				});
				//console.log(logdata);
				main.socket?.emit("log", logdata);
			},
			openReq: function (params) {
				main.openReq = true;
				$("#openReqPanel").append("<span id='openReqPanelContent' style='color:yellow'>[[ 公開中 ]]</span>");
			},
			closeReq: function (params) {
				main.openReq = false;
				$("#openReqPanelContent").remove();
			},
			setEvent: function (params) {
				//console.log("setEvent",params);
				main.events.add(params);
			},
			clearEvent: function (name) {
				//console.log("clearEvent",name);
				main.events.clear(name);
			},
			clearEventByClass: function (className) {
				//console.log("clear class",className);
				main.events.clearByClass(className);
			},
			loadScript: function (params) {
				//problems.clear();

				var lod = function () {
					plib.setScriptName(params.name);
					$.getScript(params.name)
						.done(function (script, textStatus) {
							//plib.unsetScriptName();

							problemsPanel.init();
							Object.keys(main.modules).forEach(function (elem) {
								exec({ module: elem, command: "start" });
							});
							// start to solve problems.
							problems.next();
						});
				};
				$.getScript(params.hintJs)
					.done(function (script, textStatus) {
						lod();
					})
					.fail(function (jqxhr, setting, exception) {
						lod();
					});
			},
		});

		function setModule(cm) {
			//console.log("setModule "+cm.name);
			var iframes = document.getElementsByTagName("iframe");
			for (var frm in iframes) {
				if (iframes[frm].contentWindow === cm.window) {
					bubbleIframeMouse(iframes[frm]);
					break;
				}
			}
			main.modules[cm.name] = cm;
			console.log("setModule ", cm);

			if (false === ["main", "input", "code", "output", "watch", "hint",/*,"scripts"*/].some(function (elem) {
				return main.modules[elem] === undefined;
			})) {
				exec({
					module: "main", command: "setLoginId", params: {
						userid: lsGet("loginId") || "",
						username: lsGet("loginName") || "",
					}
				});
				var st = function () {
					problemsPanel.init();

					Object.keys(main.modules).forEach(function (elem) {
						exec({ module: elem, command: "start" });
					});
					// start to solve problems.
					console.log("start problem");
					problems.next();
				};
				if (URLParams.day === undefined) {
					st();
				} else {
					problems.clear();
					$.getScript("problems/d" + URLParams.day + "/" + URLParams.day + "_hints.js");
					var lod = function (i) {
						//console.log("loading "+i);
						var scriptName = URLParams.day + "_" + ("0" + i).slice(-2) + ".js";
						plib.setScriptName(scriptName);
						$.getScript("problems/d" + URLParams.day + "/" + scriptName)
							.done(function (script, textStatus) {
								plib.unsetScriptName();
								lod(++i);
							})
							.fail(function (jqxhr, setting, exception) {
								plib.unsetScriptName();
								problems.setAllFinished();
								$("#dayPanel").html(URLParams.day);
								$("#dayPanel").css("padding", "0px 8px");
								st();
							});
					};
					lod(1);
				}
			}
		}
		function exec(receiver) {
			//console.log("exec",receiver);
			return main.modules[receiver.module] === undefined ? false : main.modules[receiver.module].window.commands.exec(receiver.command, receiver.params);
		}

		var main = new function () {
			var self = this;
			self.cookieExpiredDate = new Date();
			self.cookieExpiredDate.setTime(self.cookieExpiredDate.getTime() + (2 * 60 * 60 * 1000));


			self.loginInfo = {};
			self.modules = {};
			self.openReq = false;
			self.events = new Events();

			self.checkZen = function () {
				["input", "code"].forEach(function (elem) {
					exec({ module: elem, command: "zen2han" });
				});
			}

			self.closeToolbox = function () {
				$("#toolbox").animate({ height: "0px" }, { complete: function () { $("#toolbox").remove(); } });
			}
			self.openToolbox = function () {
				$("#TopPanel").on("click", function () {
					self.closeToolbox();
				});
				if ($("#toolbox")[0] === undefined) {
					var p = $("#toolboxButton").offset();
					var t = p.top + $("#toolboxButton").height() + 6;
					var l = $("body").width() - p.left - $("#toolboxButton").width();
					$("body").append("<div id=\"toolbox\" " +
						"style=\"width:200px;height:0px;border:solid 1px;position:absolute;" +
						"top:" + t + "px;right:" + l + "px;background:lightgrey;padding:6px;\">" +
						"</div>");
					Object.keys(main.modules).forEach(function (elem) {
						var html = exec({ module: elem, command: "getToolboxItem" });
						if (html !== false) {
							var h = Array.isArray(html) ? html : [html];
							h.forEach(function (elem) {
								$("#toolbox").append("<div style=\"margin:4px;\">" + elem + "</div>");
							});
						}
					});
					$("#toolbox").animate({ height: "100px" });
				}
			}
			self.logoff = function () {
				if (confirm("全ての回答を削除してログインし直します。よろしいですか？")) {
					$("body").clearInstruct();

					lsRemove("loginId");
					lsRemove("loginName");
					lsEach(function (name, value) {
						if ((new RegExp("^" + appName)).test(name)) {
							lsRemove(name);
						}
					});

					["input", "code", "output"].forEach(function (elem) {
						window.exec({ module: elem, command: "autoSave", params: { pnumber: undefined } });
					});
					["input", "code", "output"].forEach(function (module) {
						window.exec({ module: module, command: "clearAllCookies" });
					});
					problems.removeAllAddedScripts();
					problems.restartAll();
				}
			}
			self.onReq = function (req) {
				console.log("openReq " + main.openReq, req);
				if (main.openReq === false) {
					return;
				}
				exec({
					module: "code", command: "setEvent", params: {
						name: "afterEnd",
						loop: false,
						func: function () {
							var out = window.exec({ module: "output", command: "outputs" });
							console.log("out", out);
							self.socket.emit("res", { status: true, output: out });

							if (req.reqType !== undefined && req.reqType === "check") {
								if (out === req.output) {
									console.log("correct!");
									problems.next();
								} else {
									$("body").instruct({
										string: "不正解です。すべての入力データをチェックするところからやり直しになります。",
										align: 'center',
										arrow: false,
										offsetX: $("body").width() / 2,
										offsetY: $("body").height() / 2,
										targetEventToClose: null,
										closeButton: true,
									});
									plib.clearAllMessages();
									problems.prev();
								}
							}
						},
					}
				});
				exec({ module: "code", command: "run", params: req });
			}

			// self.socket = io("/jl");
			//self.socket = io("https://pecode.com",{path:"/jl"})
			// self.socket.on("connect",function(){
			// 	console.log("connected wsock");
			// });
			// self.socket.on("req",self.onReq);
			// self.socket.on("snowfall",function(params){
			// 	$(document).snowfall(params);
			// });
		}
	</script>
