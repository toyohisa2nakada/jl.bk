<script>
	var send = function(type,name){
		SendMessage("Exports",type,name);
	};
	var s = document.querySelector("button");
	s.addEventListener("click", function() {
		send("add","fromHTMLButton,1");
	});
	var self = {};
	$(function(){
		self.clientId = UUID.uuid();

		self.socket = io("/hiyoko");
		self.socket.on("msg req",function(req){
			console.log("msg req",req);
			var types = {
				"getType":function(){self.socket.emit("msg type",{type:"place",clientId:self.clientId});},
				"add":function(){send("add",req.id.substr(0,4)+","+(req.inHoleIndex+1));},
				"remove":function(){send("remove",req.id.substr(0,4));},
				"jump":function(){send("jump",req.id.substr(0,4));},
				"remove_ground":function(){},
				"jump_all":function(){},
			};
			types[req.cmd]();
		});
	});
</script>
